AWSTemplateFormatVersion: '2010-09-09'
Description: Static hosting with GitHub OIDC CI/CD for the self-intro-web site.

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub organization name (for OIDC setup)
    Default: jiezheng5
  GitHubRepo:
    Type: String
    Description: GitHub repository name (for OIDC setup)
    Default: bb_self_introduction
  OIDCProviderArn:
    Type: String
    Description: ARN of existing GitHub OIDC provider
    Default: arn:aws:iam::936654323206:oidc-provider/token.actions.githubusercontent.com

Conditions:
  SetupGitHubOIDC: !And
    - !Not [!Equals [!Ref GitHubOrg, ""]]
    - !Not [!Equals [!Ref GitHubRepo, ""]]
    - !Not [!Equals [!Ref OIDCProviderArn, ""]]

Resources:
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Condition: SetupGitHubOIDC
    Properties:
      RoleName: !Sub '${AWS::StackName}-github-actions-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref OIDCProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub 'repo:${GitHubOrg}/${GitHubRepo}:*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudFrontFullAccess
      Policies:
        - PolicyName: S3DeploymentAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:DeleteObject
                  - s3:PutObjectAcl
                Resource:
                  - !GetAtt SiteBucket.Arn
                  - !Sub '${SiteBucket.Arn}/*'

  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  IndexRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub '${AWS::StackName}-index-rewrite'
      AutoPublish: true
      FunctionConfig:
        Comment: Rewrite directory requests to index.html
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var uri = event.request.uri;
          if (uri.endsWith('/')) {
            event.request.uri = uri + 'index.html';
          } else if (!uri.split('/').pop().includes('.')) {
            event.request.uri = uri + '/index.html';
          }
          return event.request;
        }

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        DefaultCacheBehavior:
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt IndexRewriteFunction.FunctionARN
          TargetOriginId: site-origin
          ViewerProtocolPolicy: redirect-to-https
        DefaultRootObject: index.html
        Enabled: true
        HttpVersion: http2and3
        Origins:
          - DomainName: !GetAtt SiteBucket.RegionalDomainName
            Id: site-origin
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig: {}
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /404.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /404.html

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${SiteBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}'

Outputs:
  BucketName:
    Value: !Ref SiteBucket
  DistributionId:
    Value: !Ref SiteDistribution
  DistributionDomainName:
    Value: !GetAtt SiteDistribution.DomainName
  GitHubActionsRoleArn:
    Condition: SetupGitHubOIDC
    Value: !GetAtt GitHubActionsRole.Arn
    Description: ARN of the IAM role for GitHub Actions
